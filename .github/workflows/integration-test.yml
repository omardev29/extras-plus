name: Integration Tests

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-apps:
    name: Install & Run Apps
    runs-on: windows-latest
    steps:
      - name: Checkout Bucket
        uses: actions/checkout@v4

      - name: Install & Test Apps
        shell: pwsh
        run: |
          # Setup Scoop
          Set-ExecutionPolicy RemoteSigned -Scope CurrentUser
          irm get.scoop.sh | iex

          # Refresh PATH so scoop is available in this session
          $env:Path = [System.Environment]::GetEnvironmentVariable("Path", "Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path", "User")

          scoop install git

          # Add local bucket (copy directly since scoop bucket add requires a git URL)
          Copy-Item $env:GITHUB_WORKSPACE "$env:USERPROFILE\scoop\buckets\extras-plus" -Recurse

          # Test all apps
          $bucketPath = "$env:GITHUB_WORKSPACE\bucket"
          $failed = $false

          Get-ChildItem $bucketPath -Filter '*.json' | ForEach-Object {
              $appName = $_.BaseName
              Write-Host "`n===== Testing: $appName =====" -ForegroundColor Cyan

              # Install
              Write-Host "[$appName] Installing..." -ForegroundColor Yellow
              scoop install "extras-plus/$appName"
              if ($LASTEXITCODE -ne 0) {
                  Write-Host "[$appName] FAILED: Installation failed" -ForegroundColor Red
                  $failed = $true
                  return
              }

              # Parse manifest
              $manifest = Get-Content $_.FullName | ConvertFrom-Json
              $hasShortcuts = $null -ne $manifest.shortcuts
              $binValue = $null

              if ($manifest.bin) {
                  $binValue = if ($manifest.bin -is [array]) { $manifest.bin[0] } else { $manifest.bin }
              }

              if (-not $binValue -and -not $hasShortcuts) {
                  Write-Host "[$appName] SKIPPED: No bin or shortcuts in manifest" -ForegroundColor DarkGray
                  scoop uninstall $appName --purge
                  return
              }

              if ($hasShortcuts) {
                  # GUI app: launch and check for running process
                  $shortcutTarget = $manifest.shortcuts[0][0]
                  $exeName = [System.IO.Path]::GetFileNameWithoutExtension($shortcutTarget)

                  Write-Host "[$appName] Launching '$exeName' (GUI)..." -ForegroundColor Yellow
                  Start-Process $exeName -ErrorAction Stop
                  Start-Sleep -Seconds 15

                  $proc = Get-Process -Name $exeName -ErrorAction SilentlyContinue
                  if ($proc) {
                      Write-Host "[$appName] PASSED: Process running (PID: $($proc[0].Id))" -ForegroundColor Green
                      $proc | Stop-Process -Force -ErrorAction SilentlyContinue
                  } else {
                      Write-Host "[$appName] FAILED: Process '$exeName' not found after launch" -ForegroundColor Red
                      $failed = $true
                  }
              } else {
                  # CLI tool: just verify it executes
                  Write-Host "[$appName] Testing CLI execution..." -ForegroundColor Yellow

                  # Run the command directly (Scoop shims handle .py, .bat, etc.)
                  $output = & $binValue 2>&1
                  $exitCode = $LASTEXITCODE
                  $outputStr = $output | Out-String
                  if ($outputStr) { Write-Host "[$appName] Output: $outputStr" -ForegroundColor DarkGray }
                  # CLI tools often exit non-zero for missing args, that's expected behavior
                  Write-Host "[$appName] PASSED: CLI executed (exit code: $exitCode)" -ForegroundColor Green
              }

              # Cleanup
              Write-Host "[$appName] Uninstalling..." -ForegroundColor Yellow
              scoop uninstall $appName --purge
          }

          if ($failed) {
              Write-Host "`nSome apps failed!" -ForegroundColor Red
              exit 1
          } else {
              Write-Host "`nAll apps passed!" -ForegroundColor Green
          }
